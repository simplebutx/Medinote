services:
  api-tunnel:
    image: cloudflare/cloudflared:2026.5.1
    command: tunnel --no-autoupdate --url http://api-gateway:80
    depends_on:
      api-gateway:
        condition: service_started

  mobile-expo:
    environment:
      MOBILE_EXPO_HOST: ${MOBILE_EXPO_HOST}
      MOBILE_API_HOST: ${MOBILE_API_HOST}
      REACT_NATIVE_PACKAGER_HOSTNAME: ${MOBILE_EXPO_HOST}
      EXPO_PUBLIC_DEFAULT_API_HOST: ${MOBILE_API_HOST}
      EXPO_PUBLIC_API_BASE_URL: ${MOBILE_API_BASE_URL:-}
      EXPO_PUBLIC_PRESIGNED_UPLOAD_URL_ENDPOINT: ${EXPO_PUBLIC_PRESIGNED_UPLOAD_URL_ENDPOINT:-}
    command: ["sh", "-c", "npm run start:docker:tunnel"]
