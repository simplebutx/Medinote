services:
  mysql:
    image: mysql:8.0.44
    container_name: mymedi-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medic}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mymedi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mymedi-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  backend-auth:
    build:
      context: ./backend-auth
    container_name: mymedi-backend-auth
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medic}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      COOLSMS_API_KEY: ${COOLSMS_API_KEY}
      COOLSMS_API_SECRET: ${COOLSMS_API_SECRET}
      COOLSMS_FROM_NUMBER: ${COOLSMS_FROM_NUMBER}
      GOOGLE_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
      NAVER_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_SECRET}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    command: ["sh", "-c", "chmod +x gradlew && sed -i 's/\\r$//' gradlew && ./gradlew bootRun --no-daemon"]
    depends_on:
      redis:
        condition: service_healthy

  backend-medication:
    build:
      context: ./backend-medication
    container_name: mymedi-backend-medication
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medic}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      AI_SERVICE_BASE_URL: http://ai-server:8000
      AUTH_SERVICE_BASE_URL: http://backend-auth:8080
      PUBLIC_DATA_SERVICE_KEY: ${PUBLIC_DATA_SERVICE_KEY:-}
      PUBLIC_DATA_BASE_URL: ${PUBLIC_DATA_BASE_URL:-https://apis.data.go.kr/1471000/DrbEasyDrugInfoService/getDrbEasyDrugList}
      PUBLIC_DATA_INGREDIENT_BASE_URL: ${PUBLIC_DATA_INGREDIENT_BASE_URL:-https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07/getDrugPrdtMcpnDtlInq07}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_S3_REGION: ${AWS_S3_REGION:-}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_S3_PRESCRIPTION_PREFIX: ${AWS_S3_PRESCRIPTION_PREFIX:-prescriptions}
      AWS_PRESIGN_EXPIRATION_SECONDS: ${AWS_PRESIGN_EXPIRATION_SECONDS:-300}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8081"
    command: ["sh", "-c", "chmod +x gradlew && sed -i 's/\\r$//' gradlew && ./gradlew bootRun --no-daemon"]
    depends_on:
      ai-server:
        condition: service_started

  backend-consultation:
    build:
      context: ./backend-consultation
    container_name: mymedi-backend-consultation
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medic}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      AI_SERVICE_BASE_URL: http://ai-server:8000
      MEDICATION_SERVICE_BASE_URL: http://backend-medication:8081
      PUBLIC_DATA_SERVICE_KEY: ${PUBLIC_DATA_SERVICE_KEY:-}
      PUBLIC_DATA_BASE_URL: ${PUBLIC_DATA_BASE_URL:-https://apis.data.go.kr/1471000/DrbEasyDrugInfoService/getDrbEasyDrugList}
      PUBLIC_DATA_INGREDIENT_BASE_URL: ${PUBLIC_DATA_INGREDIENT_BASE_URL:-https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07/getDrugPrdtMcpnDtlInq07}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    command: ["sh", "-c", "chmod +x gradlew && sed -i 's/\\r$//' gradlew && ./gradlew bootRun --no-daemon"]
    depends_on:
      backend-medication:
        condition: service_started
      ai-server:
        condition: service_started

  ai-server:
    build:
      context: ./ai-server
    container_name: mymedi-ai-server
    working_dir: /app
    environment:
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/secrets/gcloud-adc.json}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY:-}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-medicine_docs}
      SCHEDULE_DB_HOST: ${MYSQL_HOST:-host.docker.internal}
      SCHEDULE_DB_PORT: ${MYSQL_PORT:-3306}
      SCHEDULE_DB_NAME: ${MYSQL_DATABASE:-medic}
      SCHEDULE_DB_USER: ${MYSQL_USERNAME:-root}
      SCHEDULE_DB_PASSWORD: ${MYSQL_PASSWORD:-root}
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-./secrets/gcloud-adc.json}:/app/secrets/gcloud-adc.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  api-gateway:
    image: nginx:1.27-alpine
    container_name: mymedi-api-gateway
    volumes:
      - ./infra/nginx/mobile-api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8090:80"
    depends_on:
      backend-auth:
        condition: service_started
      backend-medication:
        condition: service_started
      backend-consultation:
        condition: service_started

  frontend-test:
    build:
      context: ./frontend-test
    container_name: mymedi-frontend-test
    working_dir: /app
    environment:
      VITE_KAKAO_MAP_KEY: ${VITE_KAKAO_MAP_KEY:-}
    command: ["sh", "-c", "npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"
    depends_on:
      backend-medication:
        condition: service_started
      backend-consultation:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: mymedi-frontend
    working_dir: /app
    environment:
      VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:8080}
      VITE_MEDICATION_API_URL: ${VITE_MEDICATION_API_URL:-http://localhost:8081}
      VITE_CONSULTATION_API_URL: ${VITE_CONSULTATION_API_URL:-http://localhost:8082}
      VITE_AI_API_URL: ${VITE_AI_API_URL:-http://localhost:8000}
    command: ["sh", "-c", "npm run dev -- --host 0.0.0.0"]
    ports:
      - "5174:5173"
    depends_on:
      backend-auth:
        condition: service_started
      backend-medication:
        condition: service_started
      backend-consultation:
        condition: service_started

  mobile-expo:
    build:
      context: ./mobile-expo
    container_name: mymedi-mobile-expo
    working_dir: /app
    environment:
      CI: "1"
      MOBILE_EXPO_HOST: ${MOBILE_EXPO_HOST:-}
      MOBILE_API_HOST: ${MOBILE_API_HOST:-}
      REACT_NATIVE_PACKAGER_HOSTNAME: ${MOBILE_EXPO_HOST:-}
      EXPO_PUBLIC_DEFAULT_API_HOST: ${EXPO_PUBLIC_DEFAULT_API_HOST:-}
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-}
      EXPO_PUBLIC_PRESIGNED_UPLOAD_URL_ENDPOINT: ${EXPO_PUBLIC_PRESIGNED_UPLOAD_URL_ENDPOINT:-}
    command: ["sh", "-c", "npm run start:docker"]
    ports:
      - "19000:19000"
    depends_on:
      backend-auth:
        condition: service_started
      backend-medication:
        condition: service_started
      backend-consultation:
        condition: service_started

volumes:
  mysql-data:
  redis-data:
  qdrant-data:
