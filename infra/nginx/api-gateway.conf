server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # 🌟 실무 정석: 도커 내장 DNS 서브넷 지정 (컨테이너 IP 변경에 실시간 대응)
    resolver 127.0.0.11 valid=10s;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. 인증 서버 (8080)
    location /api/auth/ { 
        set $auth_backend "http://backend-auth:8080";
        proxy_pass $auth_backend; 
    }
    location /api/admin/ { 
        set $auth_backend "http://backend-auth:8080";
        proxy_pass $auth_backend; 
    }

    # 2. AI 서버 (8000) - 순서를 위로 유지
    location /api/ai/ { 
        set $ai_backend "http://ai-server:8000";
        proxy_pass $ai_backend; 
    }

    # 3. 상담/챗봇 서버 (8082)
    location /api/chatbot/ { 
        set $consult_backend "http://backend-consultation:8082";
        proxy_pass $consult_backend; 
    }
    location /api/consultation-notifications/ { 
        set $consult_backend "http://backend-consultation:8082";
        proxy_pass $consult_backend; 
    }
    location /app/consult/ { 
        set $consult_backend "http://backend-consultation:8082";
        proxy_pass $consult_backend; 
    }

    # 4. 복약 관리 서버 (8081)
    location /api/ { 
        set $medication_backend "http://backend-medication:8081";
        proxy_pass $medication_backend; 
    }
}
