server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. 인증 서버 (8080)
    location /api/auth/ { proxy_pass http://medinote-backend-auth:8080; }
    location /api/admin/ { proxy_pass http://medinote-backend-auth:8080; }

    # 2. 상담/챗봇 서버 (8082, 8000)
    location /api/chatbot/ { proxy_pass http://medinote-backend-consultation:8082; }
    location /api/consultation-notifications/ { proxy_pass http://medinote-backend-consultation:8082; }
    location /app/consult/ { proxy_pass http://medinote-backend-consultation:8082; }

    # 3. 복약 관리 서버 (8081)
    # 위에서 걸러지지 않은 나머지 모든 /api/ 요청은 8081로 전달
    location /api/ { proxy_pass http://medinote-backend-medication:8081; }
}