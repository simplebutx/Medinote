<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCR Test Medicine Bag Samples</title>
  <style>
    @page {
      size: A4;
      margin: 8mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ececec;
      color: #171717;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      letter-spacing: 0;
    }

    .screen-note,
    .answer-key {
      width: min(100% - 24px, 210mm);
      margin: 18px auto;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #c8c8c8;
      font-size: 14px;
      line-height: 1.55;
    }

    .screen-note strong {
      font-size: 16px;
    }

    .sample-page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto 18px;
      padding: 8mm;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      page-break-after: always;
    }

    .sheet {
      position: relative;
      overflow: hidden;
      background: #fffef8;
      border: 1.2px solid #8d8d8d;
      box-shadow: 0 1mm 4mm rgba(0, 0, 0, .08);
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(95deg, transparent 0 46%, rgba(0,0,0,.035) 46.2% 46.7%, transparent 47%),
        linear-gradient(177deg, transparent 0 67%, rgba(0,0,0,.025) 67.2% 67.6%, transparent 68%);
      mix-blend-mode: multiply;
    }

    .sheet::after {
      content: "TEST SAMPLE";
      position: absolute;
      right: 8mm;
      bottom: 7mm;
      color: rgba(0, 0, 0, .055);
      font-size: 22px;
      font-weight: 900;
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .landscape {
      width: 194mm;
      height: 128mm;
      display: grid;
      grid-template-columns: 63mm 1fr;
      gap: 0;
    }

    .landscape.receipt-right {
      grid-template-columns: 1fr 63mm;
    }

    .landscape.no-receipt {
      grid-template-columns: 1fr;
    }

    .portrait {
      width: 108mm;
      height: 184mm;
      padding: 5mm;
    }

    .receipt {
      position: relative;
      padding: 4mm 3mm;
      border-right: 1.4px dashed #777;
      background: #f9fbfd;
      font-size: 9px;
      line-height: 1.22;
    }

    .receipt.right {
      border-right: 0;
      border-left: 1.4px dashed #777;
    }

    .receipt h3 {
      margin: 0 0 2mm;
      padding: 1.4mm 1mm;
      background: #526d93;
      color: #fff;
      font-size: 13px;
      text-align: center;
    }

    .receipt table {
      width: 100%;
      border-collapse: collapse;
    }

    .receipt th,
    .receipt td {
      border: 1px solid #6f7e91;
      padding: .8mm;
      vertical-align: top;
    }

    .receipt th {
      width: 38%;
      background: #edf3fa;
      font-weight: 800;
    }

    .receipt .mini-list {
      margin-top: 5mm;
      border-top: 1px dashed #777;
      padding-top: 2mm;
      font-size: 9px;
      line-height: 1.25;
    }

    .receipt .mini-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 9.5mm 7.5mm 7.5mm;
      column-gap: .7mm;
      row-gap: .9mm;
      align-items: start;
      margin-top: 1mm;
    }

    .receipt .mini-grid > div {
      min-width: 0;
    }

    .receipt .mini-grid .mini-head {
      font-weight: 900;
      white-space: nowrap;
      border-bottom: 1px solid #777;
      padding-bottom: .8mm;
    }

    .receipt .mini-grid .mini-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    .receipt .mini-grid .mini-num {
      text-align: center;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .main {
      position: relative;
      padding: 5mm 5mm 4mm;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 5mm;
      align-items: start;
      margin-bottom: 3mm;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 900;
      color: #213a60;
      line-height: 1.1;
    }

    .brand-title .mark {
      display: inline-block;
      width: 7mm;
      height: 7mm;
      margin-right: 2mm;
      border-radius: 2mm;
      background: #3b6f9f;
      color: #fff;
      text-align: center;
      line-height: 7mm;
      font-size: 13px;
    }

    .meta {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 2mm 8mm;
      margin: 2mm 0 3mm;
      font-size: 13px;
      font-weight: 800;
    }

    .meta div {
      border-bottom: 1px solid #777;
      padding-bottom: .7mm;
    }

    .qr {
      width: 15mm;
      height: 15mm;
      border: 1px solid #333;
      background:
        linear-gradient(90deg, #111 0 18%, transparent 18% 34%, #111 34% 48%, transparent 48% 65%, #111 65% 78%, transparent 78%),
        linear-gradient(#111 0 14%, transparent 14% 32%, #111 32% 46%, transparent 46% 62%, #111 62% 76%, transparent 76%);
      background-size: 5mm 5mm;
      opacity: .72;
    }

    .dose-box {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      border: 1.4px solid #333;
      margin-bottom: 3mm;
      font-weight: 900;
    }

    .dose-box > div {
      padding: 2mm;
      border-right: 1px solid #333;
      text-align: center;
      font-size: 17px;
    }

    .dose-box > div:last-child {
      border-right: 0;
      font-size: 14px;
    }

    .med-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 10.5px;
      line-height: 1.22;
    }

    .med-table th {
      padding: 1.5mm 1mm;
      background: #496b94;
      color: #fff;
      font-size: 11px;
      text-align: center;
    }

    .med-table td {
      border-bottom: 1px solid #777;
      padding: 1.4mm 1mm;
      vertical-align: top;
    }

    .med-table .photo-col {
      width: 26mm;
    }

    .med-table .name-col {
      width: 36mm;
      font-weight: 900;
      font-size: 12px;
    }

    .pill-photo {
      height: 14mm;
      border: 1px solid #adc0cf;
      background: #c8dae8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2mm;
      overflow: hidden;
    }

    .pill {
      display: inline-block;
      width: 11mm;
      height: 5mm;
      border-radius: 99px;
      border: 1px solid rgba(0,0,0,.18);
      background: #f4f0d6;
    }

    .pill.round {
      width: 7mm;
      height: 7mm;
      border-radius: 50%;
    }

    .pill.green {
      background: #bfd68b;
    }

    .pill.gray {
      background: #aaa;
    }

    .pill.red {
      background: linear-gradient(90deg, #b45d62 0 50%, #f0e2d2 50%);
    }

    .pill.black {
      background: linear-gradient(90deg, #303030 0 50%, #f0df88 50%);
    }

    .icons {
      display: flex;
      gap: 1mm;
      flex-wrap: wrap;
      justify-content: center;
      color: #222;
      font-size: 15px;
      line-height: 1;
    }

    .icon {
      display: inline-flex;
      width: 7mm;
      height: 7mm;
      border: 1.2px solid #333;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      background: #fff;
    }

    .bottom-checks {
      margin-top: auto;
      border: 1.6px solid #6a7f9c;
      border-radius: 2mm;
      padding: 2mm 3mm;
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 3mm;
      font-size: 16px;
      font-weight: 900;
      color: #222;
    }

    .ocr-summary {
      margin-top: 3mm;
      padding: 2mm 2mm 1.5mm;
      border: 1.4px dashed #777;
      background: #fff;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 20mm 16mm 16mm;
      column-gap: 2.2mm;
      row-gap: 1.6mm;
      align-items: start;
      font-size: 14px;
      line-height: 1.2;
    }

    .ocr-summary > div {
      min-width: 0;
    }

    .ocr-summary .summary-head {
      font-weight: 900;
      border-bottom: 1px solid #777;
      padding-bottom: 1mm;
      white-space: nowrap;
    }

    .ocr-summary .summary-name {
      overflow-wrap: anywhere;
      word-break: keep-all;
      font-weight: 700;
    }

    .ocr-summary .summary-num {
      text-align: center;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .box {
      display: inline-block;
      width: 4mm;
      height: 4mm;
      border: 1.2px solid #333;
      margin-right: 1mm;
      vertical-align: -0.5mm;
    }

    .hand {
      position: absolute;
      color: #1b1b1b;
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 19px;
      font-weight: 900;
      transform: rotate(-7deg);
      z-index: 2;
      pointer-events: none;
    }

    .circle {
      position: absolute;
      border: 2.2px solid #222;
      border-radius: 50%;
      transform: rotate(-12deg);
      z-index: 2;
      pointer-events: none;
    }

    .checkmark {
      position: absolute;
      font-size: 28px;
      font-weight: 900;
      transform: rotate(-15deg);
      z-index: 2;
      pointer-events: none;
    }

    .faint {
      filter: contrast(.9) brightness(1.06);
      opacity: .88;
    }

    .dense .med-table {
      font-size: 9.4px;
    }

    .dense .med-table .name-col {
      font-size: 10.5px;
    }

    .portrait .top-title {
      margin-bottom: 3mm;
      padding-bottom: 2mm;
      border-bottom: 2px solid #496b94;
      color: #213a60;
      font-size: 21px;
      font-weight: 900;
      text-align: center;
    }

    .portrait .portrait-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5mm;
      margin-bottom: 3mm;
      font-size: 11px;
      font-weight: 800;
    }

    .portrait .portrait-meta div {
      border: 1px solid #aaa;
      padding: 1.4mm;
    }

    .portrait .dose-box {
      grid-template-columns: 1fr;
    }

    .portrait .dose-box > div {
      border-right: 0;
      border-bottom: 1px solid #333;
    }

    .portrait .dose-box > div:last-child {
      border-bottom: 0;
    }

    .portrait .med-table {
      font-size: 9.5px;
    }

    .portrait .med-table .photo-col {
      width: 21mm;
    }

    .portrait .med-table .name-col {
      width: 26mm;
      font-size: 10.5px;
    }

    .portrait .bottom-checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      font-size: 13px;
      margin-top: 4mm;
    }

    .portrait .ocr-summary {
      grid-template-columns: minmax(0, 1fr) 14mm 12mm 12mm;
      font-size: 11.5px;
    }

    .simple-label {
      height: 112mm;
    }

    .simple-label .med-table .photo-col,
    .simple-label .med-table td:first-child,
    .simple-label .med-table th:first-child {
      display: none;
    }

    .simple-label .portrait-receipt {
      display: none;
    }

    .document-style {
      height: 150mm;
    }

    .document-style .dose-box {
      margin-bottom: 5mm;
    }

    .pictogram-heavy .icon {
      width: 9mm;
      height: 9mm;
      font-size: 14px;
      border-width: 1.5px;
    }

    .pictogram-heavy .med-table td:last-child {
      background: #f5f8fb;
    }

    .roll {
      width: 76mm;
      height: 210mm;
      background: #fff;
      border-style: dashed;
      font-family: "Consolas", "Malgun Gothic", monospace;
    }

    .roll .top-title {
      font-size: 17px;
      color: #111;
      border-bottom: 1px dashed #555;
    }

    .roll .portrait-meta {
      grid-template-columns: 1fr;
      font-size: 9px;
    }

    .roll .dose-box > div {
      font-size: 13px;
    }

    .roll .med-table {
      font-size: 8px;
    }

    .roll .med-table .photo-col,
    .roll .med-table td:first-child,
    .roll .med-table th:first-child {
      display: none;
    }

    .roll .bottom-checks {
      grid-template-columns: 1fr;
      font-size: 10px;
    }

    .portrait-receipt {
      margin-top: 4mm;
      padding-top: 3mm;
      border-top: 1.4px dashed #777;
      font-size: 9px;
      line-height: 1.25;
    }

    .answer-key h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .answer-key table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .answer-key th,
    .answer-key td {
      border: 1px solid #aaa;
      padding: 5px;
      text-align: left;
      vertical-align: top;
    }

    @media print {
      body {
        background: #fff;
      }

      .screen-note,
      .answer-key {
        display: none;
      }

      .sample-page {
        margin: 0;
        box-shadow: none;
      }

      .sheet {
        box-shadow: none;
      }
    }

    body.capture-mode {
      background: white;
      padding: 0;
    }

    body.capture-mode .screen-note,
    body.capture-mode .answer-key {
      display: none;
    }

    body.capture-mode .sample-page {
      min-height: auto;
      padding: 0;
      page-break-after: auto;
    }

    body.capture-mode .sheet {
      margin: 0;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <section class="screen-note">
    <strong>약봉지 OCR 테스트 유형별 샘플 12종</strong><br>

    이름, 병원, 약국은 더미 데이터이며, 약품명은 DB item_name과 정확히 일치하는 이름 및 현재 매칭 로직으로 잡히는 축약명을 섞었습니다.
  </section>

  <main id="samples"></main>

      </thead>
      <tbody></tbody>
    </table>
  </section>

      const selfPay = Math.round(total * 0.3 / 10) * 10;
      const insurance = total - selfPay;
      const parseReceiptDose = (text) => {
        const amount = text.match(/(\d+(?:\.\d+)?)(?:정|캡슐|캡|병|포|mL|매|방울)/);
        const times = text.match(/(\d+)회/);
        const days = text.match(/(\d+)일분/);
        return {
          amount: amount ? amount[1] : "1",
          times: times ? times[1] : "1",
          days: days ? days[1] : String(sample.days),
        };
      };
      const receiptMedicineName = (name) => name
        .replace(/\{[^}]*\}/g, "")
        .replace(/\([^)]*\)/g, "")
        .replace(/\[[^\]]*\]/g, "")
        .trim();
      const medRows = sample.meds.slice(0, 5).map((m) => {
        const dose = parseReceiptDose(m[3]);
        return `
          <div class="mini-name">${receiptMedicineName(m[0])}</div>
          <div class="mini-num">${dose.amount}</div>
          <div class="mini-num">${dose.times}</div>
          <div class="mini-num">${dose.days}</div>
        `;
      }).join("");
      return `
        <aside class="receipt ${side === "right" ? "right" : ""}">
          <h3>약제비 계산서 · 영수증</h3>
          <table>
            <tr><th>영수증번호</th><td>${sample.date.replaceAll("-", "")}-${sample.id.slice(1).padStart(5, "0")}</td></tr>
            <tr><th>환자성명</th><td>${sample.patient}</td></tr>
            <tr><th>조제일자</th><td>${sample.date}</td></tr>
            <tr><th>투약일수</th><td>${sample.days} □야간 □공휴</td></tr>
            <tr><th>약제비총액</th><td>${total.toLocaleString()} 원</td></tr>
            <tr><th>본인부담금</th><td>${selfPay.toLocaleString()} 원</td></tr>
            <tr><th>보험자부담금</th><td>${insurance.toLocaleString()} 원</td></tr>
            <tr><th>상호</th><td>${sample.pharmacist.slice(0, 1)}온누리약국</td></tr>
            <tr><th>발행일</th><td>${sample.date}</td></tr>
          </table>
          <div class="mini-list">
            <div class="mini-grid">
              <div class="mini-head">약품명</div>
              <div class="mini-head mini-num">투약량</div>
              <div class="mini-head mini-num">횟수</div>
              <div class="mini-head mini-num">일수</div>
              ${medRows}
            </div>
          </div>
        </aside>
      `;
    }

    function pillPhoto(kind) {
      const cls = kind === "round" ? "pill round" : `pill ${kind || ""}`;
      return `<div class="pill-photo"><span class="${cls}"></span><span class="${cls}"></span></div>`;
    }

    function medTable(sample) {
      return `
        <table class="med-table">
          <thead>
            <tr>
              <th class="photo-col">약품사진</th>
              <th class="name-col">약품명</th>
              <th>복약안내</th>
              <th>주의사항</th>
            </tr>
          </thead>
          <tbody>
            ${sample.meds.map((m, idx) => `
              <tr>
                <td>${pillPhoto(m[5])}</td>
                <td class="name-col">${m[0]}<br><span style="font-weight:400">${m[1]}</span></td>
                <td><strong>${m[3]}</strong><br>${m[2]}</td>
                <td>
                  <div class="icons">
                    <span class="icon">${iconSet[(idx + sample.days) % iconSet.length]}</span>
                    <span class="icon">${iconSet[(idx + 2) % iconSet.length]}</span>
                  </div>
                  <div style="margin-top:1mm;text-align:center">${m[4]}</div>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function marksHtml(sample) {
      return (sample.marks || []).map((mark) => {
        if (mark.type === "circle") {
          return `<span class="circle" style="left:${mark.left};top:${mark.top};width:${mark.w};height:${mark.h}"></span>`;
        }
        if (mark.type === "check") {
          return `<span class="checkmark" style="left:${mark.left};top:${mark.top}">✓</span>`;
        }
        return `<span class="hand" style="left:${mark.left};top:${mark.top}">${mark.text}</span>`;
      }).join("");
    }

    function parseReceiptDose(text, sample) {
      const amount = text.match(/(\d+(?:\.\d+)?)(?:정|캡슐|캡|병|포|mL|매|방울)/);
      const times = text.match(/(\d+)회/);
      const days = text.match(/(\d+)일분/);
      return {
        amount: amount ? amount[1] : "1",
        times: times ? times[1] : "1",
        days: days ? days[1] : String(sample.days),
      };
    }

    function ocrSummaryHtml(sample) {
      const summaryMedicineName = (name) => name
        .replace(/\{[^}]*\}/g, "")
        .replace(/\([^)]*\)/g, "")
        .replace(/\[[^\]]*\]/g, "")
        .trim();

      return `
        <div class="ocr-summary">
          <div class="summary-head">약품명</div>
          <div class="summary-head summary-num">투약량</div>
          <div class="summary-head summary-num">횟수</div>
          <div class="summary-head summary-num">일수</div>
          ${sample.meds.map((m) => {
            const dose = parseReceiptDose(m[3], sample);
            return `
              <div class="summary-name">${summaryMedicineName(m[0])}</div>
              <div class="summary-num">${dose.amount}</div>
              <div class="summary-num">${dose.times}</div>
              <div class="summary-num">${dose.days}</div>
            `;
          }).join("")}
        </div>
      `;
    }

    function mainHtml(sample) {
      return `
        <section class="main">
          <div class="brand-row">
            <div>
              <div class="brand-title"><span class="mark">✓</span>${sample.title} <span style="font-size:14px;color:#111">(다음내방일:　　　　)</span></div>
              <div class="meta">
                <div>환자정보 : ${sample.patient} (${sample.age})</div>
                <div>조제 약사 : ${sample.pharmacist}</div>
                <div>병원정보 : ${sample.hospital}</div>
                <div>조제 일자 : ${sample.date}</div>
              </div>
            </div>
            ${sample.qr ? '<div class="qr" aria-label="QR placeholder"></div>' : ''}
          </div>
          <div class="dose-box">
            <div>${sample.dose}</div>
            <div>${sample.timing}</div>
          </div>
          ${medTable(sample)}
          <div class="bottom-checks">
            <span><span class="box"></span>아침</span>
            <span><span class="box"></span>점심</span>
            <span><span class="box"></span>저녁</span>
            <span><span class="box"></span>취침전</span>
            <span><span class="box"></span>식후30분</span>
          </div>
          ${ocrSummaryHtml(sample)}
          ${marksHtml(sample)}
        </section>
      `;
    }

    function landscapeHtml(sample) {
      const receiptSide = sample.receipt || "left";
      const classes = ["sheet", "landscape", sample.className || ""];
      if (receiptSide === "right") classes.push("receipt-right");
      if (receiptSide === "none") classes.push("no-receipt");

      const left = receiptSide === "left" ? receiptHtml(sample, "left") : "";
      const right = receiptSide === "right" ? receiptHtml(sample, "right") : "";
      return `<article class="${classes.join(" ")}">${left}${mainHtml(sample)}${right}</article>`;
    }

    function portraitHtml(sample) {
      return `
        <article class="sheet portrait ${sample.className || ""}">
          <div class="top-title">${sample.title}</div>
          <div class="portrait-meta">
            <div>환자: ${sample.patient}<br>${sample.age}</div>
            <div>조제일: ${sample.date}<br>${sample.days}일분</div>
            <div>병원: ${sample.hospital}</div>
            <div>약사: ${sample.pharmacist}</div>
          </div>
          <div class="dose-box">
            <div>${sample.dose}</div>
            <div>${sample.timing}</div>
          </div>
          ${medTable(sample)}
          <div class="bottom-checks">
            <span><span class="box"></span>아침</span>
            <span><span class="box"></span>점심</span>
            <span><span class="box"></span>저녁</span>
            <span><span class="box"></span>취침전</span>
          </div>
          ${ocrSummaryHtml(sample)}
          <div class="portrait-receipt">
            <strong>약제비 영수증</strong><br>
            영수증번호 ${sample.date.replaceAll("-", "")}-${sample.id.slice(1).padStart(5, "0")}<br>
            약국명 ${sample.pharmacist.slice(0, 1)}온누리약국 / 테스트용 더미 데이터<br>
            약품명: ${sample.meds.map((m) => m[0]).join(", ")}
          </div>
          ${sample.qr ? '<div class="qr" style="position:absolute;right:5mm;bottom:5mm"></div>' : ''}
          ${marksHtml(sample)}
        </article>
      `;
    }

    const params = new URLSearchParams(window.location.search);
    const singleId = params.get("single");
    const filter = params.get("filter");
    if (params.get("capture") === "1") {
      document.body.classList.add("capture-mode");
    }
    const visibleSamples = singleId
      ? samples.filter((sample) => sample.id === singleId)
      : filter === "landscape-receipts"
        ? samples.filter((sample) => sample.orientation === "landscape" && sample.receipt !== "none")
        : filter === "new-regression"
          ? samples.filter((sample) => Number(sample.id.slice(1)) >= 13)
          : samples;

    const root = document.getElementById("samples");
    root.innerHTML = visibleSamples.map((sample) => `
      <section class="sample-page">
        ${sample.orientation === "landscape" ? landscapeHtml(sample) : portraitHtml(sample)}
      </section>
    `).join("");

    const tbody = document.querySelector("#answerKey tbody");
    tbody.innerHTML = visibleSamples.map((sample) => `
      <tr>
        <td>${sample.id}</td>
        <td>${sample.orientation === "landscape" ? "가로" : "세로"}</td>
        <td>${sample.patient} / ${sample.dose} / ${sample.meds.map((m) => m[0]).join(", ")}</td>
        <td>${sample.point}</td>
      </tr>
    `).join("");
  </script>
</body>
</html>
