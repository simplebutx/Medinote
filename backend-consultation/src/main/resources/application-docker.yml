spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:medic}
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

public-data:
  service-key: ${PUBLIC_DATA_SERVICE_KEY:}
  base-url: ${PUBLIC_DATA_BASE_URL:https://apis.data.go.kr/1471000/DrbEasyDrugInfoService/getDrbEasyDrugList}
  ingredient-base-url: ${PUBLIC_DATA_INGREDIENT_BASE_URL:https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07/getDrugPrdtMcpnDtlInq07}

ai:
  service:
    base-url: ${AI_SERVICE_BASE_URL:http://ai-server:8000}

medication:
  service:
    base-url: ${MEDICATION_SERVICE_BASE_URL:http://backend-medication:8081}

logging:
  level:
    com.ibmteam02.backend_medication.chatbot.service: DEBUG
