name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Create .env.production file
        working-directory: ./frontend
        run: |
          echo "VITE_AUTH_API_URL=http://3.39.233.251:8090/auth" > .env.production
          echo "VITE_MEDICATION_API_URL=http://3.39.233.251:8090/medication" >> .env.production
          echo "VITE_CONSULTATION_API_URL=http://3.39.233.251:8090/consultation" >> .env.production
          echo "VITE_AI_API_URL=http://3.39.233.251:8090/ai" >> .env.production

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to S3
        run: aws s3 sync ./frontend/dist s3://medinote-team-frontend --delete