name: Deploy Backend to EC2 via ECR

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'frontend/**'
      - 'frontend-test/**'
      - 'mobile-expo/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_BACKEND }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_BACKEND }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push images to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # 1. Auth Service
          docker build -t $ECR_REGISTRY/medinote-auth:latest ./backend-auth
          docker push $ECR_REGISTRY/medinote-auth:latest
          
          # 2. Medication Service
          docker build -t $ECR_REGISTRY/medinote-medication:latest ./backend-medication
          docker push $ECR_REGISTRY/medinote-medication:latest
          
          # 3. Consultation Service
          docker build -t $ECR_REGISTRY/medinote-consultation:latest ./backend-consultation
          docker push $ECR_REGISTRY/medinote-consultation:latest
          
          # 4. AI Server
          docker build -t $ECR_REGISTRY/medinote-ai-server:latest ./ai-server
          docker push $ECR_REGISTRY/medinote-ai-server:latest
          
          # 5. Nginx (Gateway)
          docker build -t $ECR_REGISTRY/medinote-nginx:latest -f ./infra/nginx/Dockerfile . || \
          docker build -t $ECR_REGISTRY/medinote-nginx:latest -f ./infra/nginx/Dockerfile ./infra/nginx
          docker push $ECR_REGISTRY/medinote-nginx:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Starting Production Deployment (Pulling from ECR)..."
            cd ~/ibmteam02
            
            # 최신 docker-compose.prod.yml 가져오기
            git pull origin main
            
            # ECR 로그인 (EC2에서도 권한 필요)
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_URI }}
            
            # 1. 최신 이미지 당겨오기 (바뀐 이미지만 받아옴)
            echo "Pulling latest images from ECR..."
            docker compose -f docker-compose.prod.yml pull
            
            # 2. 스마트 업데이트 (바뀐 컨테이너만 껐다 켜짐)
            echo "Updating services..."
            docker compose -f docker-compose.prod.yml up -d
            
            # 3. 찌꺼기 정리
            docker image prune -f
            echo "Smart Deployment Completed Successfully!"
