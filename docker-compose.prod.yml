version: '3.8'

services:
  # 1. 공용 대문 (API Gateway)
  api-gateway:
    image: 818783923876.dkr.ecr.ap-northeast-2.amazonaws.com/medinote-nginx:latest
    container_name: medinote-api-gateway
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - ./infra/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8090:80"
    depends_on:
      - backend-auth
      - backend-medication
      - backend-consultation
    restart: always

  # 2. 인증 서비스 (8080)
  backend-auth:
    image: 818783923876.dkr.ecr.ap-northeast-2.amazonaws.com/medinote-auth:latest
    container_name: medinote-backend-auth
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 512M
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xmx512m -Xms512m"
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medic}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MEDICATION_SERVICE_BASE_URL: http://medinote-backend-medication:8081
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      COOLSMS_API_KEY: ${COOLSMS_API_KEY}
      COOLSMS_API_SECRET: ${COOLSMS_API_SECRET}
      COOLSMS_FROM_NUMBER: ${COOLSMS_FROM_NUMBER}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      FRONTEND_URL: ${FRONTEND_URL:-https://d3s9d84ez4sxzx.cloudfront.net}
    ports:
      - "8080:8080"
    restart: always

  # 3. 복약 관리 서비스 (8081)
  backend-medication:
    image: 818783923876.dkr.ecr.ap-northeast-2.amazonaws.com/medinote-medication:latest
    container_name: medinote-backend-medication
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 512M
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xmx512m -Xms512m"
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medic}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      AI_SERVICE_BASE_URL: http://medinote-ai-server:8000
      AUTH_SERVICE_BASE_URL: http://medinote-backend-auth:8080
      PUBLIC_DATA_SERVICE_KEY: ${PUBLIC_DATA_SERVICE_KEY}
      PUBLIC_DATA_BASE_URL: ${PUBLIC_DATA_BASE_URL}
      PUBLIC_DATA_INGREDIENT_BASE_URL: ${PUBLIC_DATA_INGREDIENT_BASE_URL}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT}
      AWS_S3_PRESCRIPTION_PREFIX: ${AWS_S3_PRESCRIPTION_PREFIX}
      AWS_PRESIGN_EXPIRATION_SECONDS: ${AWS_PRESIGN_EXPIRATION_SECONDS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
    ports:
      - "8081:8081"
    restart: always

  # 4. 상담 서비스 (8082)
  backend-consultation:
    image: 818783923876.dkr.ecr.ap-northeast-2.amazonaws.com/medinote-consultation:latest
    container_name: medinote-backend-consultation
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 512M
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xmx512m -Xms512m"
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-medic}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      AI_SERVICE_BASE_URL: http://medinote-ai-server:8000
      MEDICATION_SERVICE_BASE_URL: http://medinote-backend-medication:8081
      PUBLIC_DATA_SERVICE_KEY: ${PUBLIC_DATA_SERVICE_KEY}
      PUBLIC_DATA_BASE_URL: ${PUBLIC_DATA_BASE_URL}
      PUBLIC_DATA_INGREDIENT_BASE_URL: ${PUBLIC_DATA_INGREDIENT_BASE_URL}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
    ports:
      - "8082:8082"
    restart: always

  # 5. AI 서버 (8000)
  ai-server:
    image: 818783923876.dkr.ecr.ap-northeast-2.amazonaws.com/medinote-ai-server:latest
    container_name: medinote-ai-server
    deploy:
      resources:
        limits:
          memory: 1G
    env_file: .env
    environment:
      LLM_API_URL: ${LLM_API_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/secrets/gcloud-adc.json}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${GOOGLE_APPLICATION_CREDENTIALS_JSON}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT}
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-solar-embedding-1-large-passage}
      EMBEDDING_QUERY_MODEL: ${EMBEDDING_QUERY_MODEL:-solar-embedding-1-large-query}
      EMBEDDING_PASSAGE_MODEL: ${EMBEDDING_PASSAGE_MODEL:-solar-embedding-1-large-passage}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-4096}
      QDRANT_URL: http://medinote-qdrant:6333
      QDRANT_COLLECTION_NAME: medicine_docs
      SCHEDULE_DB_HOST: ${MYSQL_HOST}
      SCHEDULE_DB_PORT: ${MYSQL_PORT:-3306}
      SCHEDULE_DB_NAME: ${MYSQL_DATABASE:-medic}
      SCHEDULE_DB_USER: ${MYSQL_USERNAME}
      SCHEDULE_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-./secrets/gcloud-adc.json}:/app/secrets/gcloud-adc.json:ro
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      qdrant:
        condition: service_started

  # 6. 필수 인프라
  redis:
    image: redis:7-alpine
    container_name: medinote-redis
    deploy:
      resources:
        limits:
          memory: 64M
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: medinote-qdrant
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - qdrant-data:/qdrant/storage
    restart: always

volumes:
  qdrant-data:
  redis-data:
