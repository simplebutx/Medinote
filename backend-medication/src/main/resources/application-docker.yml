spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:medic}?zeroDateTimeBehavior=convertToNull
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

public-data:
  service-key: ${PUBLIC_DATA_SERVICE_KEY:}
  base-url: ${PUBLIC_DATA_BASE_URL:https://apis.data.go.kr/1471000/DrbEasyDrugInfoService/getDrbEasyDrugList}
  ingredient-base-url: ${PUBLIC_DATA_INGREDIENT_BASE_URL:https://apis.data.go.kr/1471000/DrugPrdtPrmsnInfoService07/getDrugPrdtMcpnDtlInq07}

ai:
  service:
    base-url: ${AI_SERVICE_BASE_URL:http://ai-server:8000}

auth:
  service:
    base-url: ${AUTH_SERVICE_BASE_URL:http://backend-auth:8080}

aws:
  s3:
    region: ${AWS_S3_REGION:${AWS_REGION:ap-northeast-2}}
    bucket: ${AWS_S3_BUCKET:}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    endpoint: ${AWS_S3_ENDPOINT:}
    key-prefix: ${AWS_S3_PRESCRIPTION_PREFIX:prescriptions}
    presign-expiration-seconds: ${AWS_PRESIGN_EXPIRATION_SECONDS:300}

logging:
  level:
    com.ibmteam02.backend_medication.chatbot.service: DEBUG

jwt:
  secret: ${JWT_SECRET:your-very-long-and-secure-secret-key-at-least-32-chars}
  expiration: ${JWT_EXPIRATION:3600000}
